# Number of test nodes
CLUSTER_NUM_NODES=1

# VM specifications
CLUSTER_NODE_MEMORY=2048          # MB
CLUSTER_NODE_VCPUS=2
CLUSTER_NODE_DISK_SIZE=20         # GB

# Base OS image for VMs
CLUSTER_NODE_OS_IMAGE="/var/lib/libvirt/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2"

# OS variant for virt-install
CLUSTER_NODE_OS_VARIANT="linux2024"

# Storage Export Configuration
CLUSTER_NUM_SCSI=64       # Number of iSCSI devices
CLUSTER_NUM_NVME=0       # Number of NVMe devices

# iSCSI device configuration
CLUSTER_SCSI_SIZE=2048 # MB per iSCSI device
CLUSTER_SCSI_SECTOR_SIZE=512 # 512 or 4096
CLUSTER_SCSI_BACKING_TYPE="file_sparse"
CLUSTER_SCSI_OPTIMAL_IO_SIZE=1024 # KB (0=no preference, 1024=1MB)

# NVMe device configuration
CLUSTER_NVME_SIZE=1024              # MB per NVMe device
CLUSTER_NVME_SECTOR_SIZE=512 # 512 or 4096
CLUSTER_NVME_BACKING_TYPE="loop_sparse"

# Multipath device configuration
CLUSTER_NUM_MULTIPATH=0    # Number of multipath devices
CLUSTER_MULTIPATH_PATHS=2         # Paths per multipath device
CLUSTER_MULTIPATH_SIZE=1024            # MB per multipath device
CLUSTER_MULTIPATH_SECTOR_SIZE=512 # 512 or 4096
CLUSTER_MULTIPATH_BACKING_TYPE="loop_sparse"

# Lock manager configuration
CLUSTER_LOCK_TYPE="none"         # sanlock or dlm

# Source tree deployment

# Sanlock source deployment

# Sanlock configuration (deployed to /etc/sanlock/sanlock.conf)
SANLOCK_CONF_SETTINGS+=("io_timeout=2")

# Package installation
CLUSTER_BASE_PACKAGES="sg3_utils"

# Network configuration
CLUSTER_NETWORK_NAME="default"

# SSH configuration
CLUSTER_SSH_USER="root"
CLUSTER_SSH_KEY_DIR="$HOME/.ssh"

# Timeouts (seconds)
CLUSTER_VM_BOOT_TIMEOUT=300
CLUSTER_SSH_READY_TIMEOUT=180
CLUSTER_STORAGE_READY_TIMEOUT=60

# Debug mode
CLUSTER_DEBUG=0

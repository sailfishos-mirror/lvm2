# Default cluster configuration for LVM testing
#
# This configuration can be copied and customized for specific test scenarios.
# All values shown are defaults.

# Number of test nodes (nodes 1, 2, 3, ...)
# NOTE: Node 0 is always the storage exporter node and is created automatically
# Total VMs created = CLUSTER_NUM_NODES + 1 (test nodes + exporter node)
CLUSTER_NUM_NODES="${CLUSTER_NUM_NODES:-3}"

# VM specifications
CLUSTER_NODE_MEMORY="${CLUSTER_NODE_MEMORY:-2048}"          # MB
CLUSTER_NODE_VCPUS="${CLUSTER_NODE_VCPUS:-2}"
CLUSTER_NODE_DISK_SIZE="${CLUSTER_NODE_DISK_SIZE:-20}"         # GB

# Base OS image for VMs
# This should point to a cloud-ready image (cloud-init enabled)
# Examples:
#   - Fedora: /var/lib/libvirt/images/fedora-cloud-base.qcow2
#   - CentOS Stream: /var/lib/libvirt/images/centos-stream-9.qcow2
#   - Generic cloud image path
CLUSTER_NODE_OS_IMAGE="${CLUSTER_NODE_OS_IMAGE:-}"

# OS variant for virt-install (see: virt-install --osinfo list)
# Examples: fedora40, fedora41, centos-stream9, linux2024
CLUSTER_NODE_OS_VARIANT="${CLUSTER_NODE_OS_VARIANT:-linux2024}"

# Storage export configuration (runs on node 0)
CLUSTER_STORAGE_TYPE="${CLUSTER_STORAGE_TYPE:-iscsi}"        # iscsi, nvme, or both
CLUSTER_NUM_DEVICES="${CLUSTER_NUM_DEVICES:-5}"
CLUSTER_DEVICE_SIZE="${CLUSTER_DEVICE_SIZE:-1024}"          # MB per device
CLUSTER_DEVICE_SECTOR_SIZE="${CLUSTER_DEVICE_SECTOR_SIZE:-512}"    # or 4096

# Backing storage type:
#   file       = dd preallocated file + targetcli fileio
#   sparsefile = targetcli fileio with sparse=true (default, space-efficient)
#   ramdisk    = targetcli rd_mcp ramdisk
CLUSTER_BACKING_TYPE="${CLUSTER_BACKING_TYPE:-sparsefile}"

# Multipath configuration
CLUSTER_MULTIPATH_ENABLE="${CLUSTER_MULTIPATH_ENABLE:-0}"
CLUSTER_MULTIPATH_PATHS="${CLUSTER_MULTIPATH_PATHS:-2}"

# Lock manager configuration
CLUSTER_LOCK_TYPE="${CLUSTER_LOCK_TYPE:-sanlock}"         # sanlock or dlm

# Source tree deployment (for testing in-development code)
CLUSTER_USE_SOURCE="${CLUSTER_USE_SOURCE:-0}"              # 1 = deploy and compile LVM source on test nodes
CLUSTER_SOURCE_DIR="${CLUSTER_SOURCE_DIR:-}"               # Path to LVM source tree (default: auto-detect from CWD)
CLUSTER_BUILD_OPTS="${CLUSTER_BUILD_OPTS:-}"               # Additional configure/make options for LVM

# Sanlock source deployment (for testing in-development sanlock)
SANLOCK_USE_SOURCE="${SANLOCK_USE_SOURCE:-0}"              # 1 = deploy and compile sanlock source on test nodes
SANLOCK_SOURCE_DIR="${SANLOCK_SOURCE_DIR:-}"               # Path to sanlock source tree
SANLOCK_BUILD_OPTS="${SANLOCK_BUILD_OPTS:-}"               # Additional make options for sanlock

# Package installation
CLUSTER_BASE_PACKAGES="${CLUSTER_BASE_PACKAGES:-sg3_utils}"
CLUSTER_EXTRA_PACKAGES_FILE="${CLUSTER_EXTRA_PACKAGES_FILE:-}"      # Optional file with additional packages (one per line)

# Network configuration
CLUSTER_NETWORK_NAME="${CLUSTER_NETWORK_NAME:-default}"  # libvirt network name

# SSH configuration
CLUSTER_SSH_USER="${CLUSTER_SSH_USER:-root}"
CLUSTER_SSH_KEY_DIR="${CLUSTER_SSH_KEY_DIR:-$HOME/.ssh}"

# Timeouts (seconds)
CLUSTER_VM_BOOT_TIMEOUT="${CLUSTER_VM_BOOT_TIMEOUT:-300}"
CLUSTER_SSH_READY_TIMEOUT="${CLUSTER_SSH_READY_TIMEOUT:-180}"
CLUSTER_STORAGE_READY_TIMEOUT="${CLUSTER_STORAGE_READY_TIMEOUT:-60}"

# Debug mode (set to 1 for verbose output)
CLUSTER_DEBUG="${CLUSTER_DEBUG:-0}"
